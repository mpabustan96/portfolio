<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 560 350" width="560" height="350">
  <defs>
    <linearGradient id="bgGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0d1321"/>
      <stop offset="100%" stop-color="#1a2336"/>
    </linearGradient>
    <linearGradient id="bronzeGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#C58A3F"/>
      <stop offset="100%" stop-color="#DDA659"/>
    </linearGradient>
    <radialGradient id="glowCenter" cx="72%" cy="50%" r="40%">
      <stop offset="0%" stop-color="#C58A3F" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="#0d1321" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- Background -->
  <rect width="560" height="350" fill="url(#bgGrad)"/>
  <rect width="560" height="350" fill="url(#glowCenter)"/>

  <!-- Subtle horizontal rule lines — like range markings -->
  <line x1="0" y1="70" x2="560" y2="70" stroke="#1f2a3e" stroke-width="1"/>
  <line x1="0" y1="280" x2="560" y2="280" stroke="#1f2a3e" stroke-width="1"/>

  <!-- Left text block -->
  <!-- Eyebrow -->
  <text x="48" y="108" font-family="'JetBrains Mono', monospace" font-size="10" font-weight="500" letter-spacing="2" text-transform="uppercase" fill="#C58A3F" opacity="0.9">COLUMBIA BOOTCAMP</text>

  <!-- CHIRON wordmark — large -->
  <text x="48" y="185" font-family="Georgia, serif" font-size="58" font-weight="400" font-style="italic" fill="#F3EFE6" letter-spacing="-1">Chiron</text>

  <!-- Tagline -->
  <text x="48" y="215" font-family="'JetBrains Mono', monospace" font-size="11.5" fill="#868EA0" letter-spacing="0.5">"Take Aim And Shoot For Your Goals"</text>

  <!-- Tags row -->
  <rect x="48" y="238" width="70" height="22" rx="11" fill="none" stroke="#C58A3F" stroke-opacity="0.45" stroke-width="1"/>
  <text x="83" y="253" font-family="Georgia, serif" font-size="10" fill="#DDA659" text-anchor="middle">Fitness App</text>

  <rect x="128" y="238" width="68" height="22" rx="11" fill="none" stroke="#3A4254" stroke-width="1"/>
  <text x="162" y="253" font-family="Georgia, serif" font-size="10" fill="#868EA0" text-anchor="middle">Team of 4</text>

  <rect x="206" y="238" width="68" height="22" rx="11" fill="none" stroke="#3A4254" stroke-width="1"/>
  <text x="240" y="253" font-family="Georgia, serif" font-size="10" fill="#868EA0" text-anchor="middle">Figma Proto</text>

  <!-- Divider between text and reticle -->
  <line x1="336" y1="70" x2="336" y2="280" stroke="#2B313F" stroke-width="1"/>

  <!-- Right side — target reticle, centered in right panel -->
  <!-- Panel right = 336 to 560, center = 448, vertical center = 175 -->
  <g transform="translate(448, 175)">
    <!-- Outer rings — faint -->
    <circle r="100" fill="none" stroke="#2B313F" stroke-width="1"/>
    <circle r="78" fill="none" stroke="#2B313F" stroke-width="1"/>
    <!-- Mid rings — bronze -->
    <circle r="56" fill="none" stroke="#C58A3F" stroke-width="1.2" opacity="0.6"/>
    <circle r="34" fill="none" stroke="#C58A3F" stroke-width="1.5" opacity="0.8"/>
    <circle r="12" fill="none" stroke="#C58A3F" stroke-width="1.8"/>

    <!-- Crosshair ticks -->
    <line x1="0" y1="-108" x2="0" y2="-92" stroke="#C58A3F" stroke-width="1.5" stroke-linecap="round"/>
    <line x1="0" y1="92" x2="0" y2="108" stroke="#C58A3F" stroke-width="1.5" stroke-linecap="round"/>
    <line x1="-108" y1="0" x2="-92" y2="0" stroke="#C58A3F" stroke-width="1.5" stroke-linecap="round"/>
    <line x1="92" y1="0" x2="108" y2="0" stroke="#C58A3F" stroke-width="1.5" stroke-linecap="round"/>

    <!-- Bullseye -->
    <circle r="4" fill="#DDA659"/>
  </g>

  <!-- Bottom rule -->
  <rect x="0" y="340" width="560" height="1" fill="url(#bronzeGrad)" opacity="0.35"/>
</svg>
