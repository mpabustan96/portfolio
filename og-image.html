<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<style>
  :root {
    --midnight:   #0A0C12;
    --paper:      #EDEFF5;
    --ink-quiet:  #8B91A3;
    --periwinkle: #7A9CFF;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  html, body {
    width: 1200px;
    height: 630px;
    background: var(--midnight);
    overflow: hidden;
  }

  /* NOTE: substituting Poppins for Unbounded -- no network access in this
     sandbox to fetch Google Fonts. Swap font-family to 'Unbounded' once
     the real font file is available for pixel-perfect match. */
  body {
    font-family: 'Poppins', -apple-system, BlinkMacSystemFont, sans-serif;
    position: relative;
  }

  .glow {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    width: 640px;
    height: 640px;
    border-radius: 50%;
    background: radial-gradient(circle, rgba(122,156,255,0.20), transparent 68%);
    filter: blur(60px);
    z-index: 0;
    pointer-events: none;
  }

  .avatar-bg {
    position: absolute;
    top: 50%;
    left: 50%;
    height: 560px;
    width: auto;
    transform: translate(-50%, -50%);
    z-index: 1;
    pointer-events: none;
  }

  /* Soft dark scrim above the avatar, below the text, so copy keeps
     full contrast no matter how the faded portrait falls behind it */
  .scrim {
    position: absolute;
    inset: 0;
    background: radial-gradient(ellipse 620px 260px at 50% 54%, rgba(10,12,18,0.55), transparent 70%);
    z-index: 2;
    pointer-events: none;
  }

  .logo-corner {
    position: absolute;
    top: 48px;
    left: 64px;
    height: 46px;
    width: auto;
    display: block;
    z-index: 3;
  }

  .frame {
    position: relative;
    z-index: 3;
    width: 1200px;
    height: 630px;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    text-align: center;
  }

  .name {
    font-size: 92px;
    font-weight: 600;
    line-height: 1.05;
    color: var(--paper);
    letter-spacing: -0.01em;
  }

  .tag {
    margin-top: 30px;
    font-size: 21px;
    font-weight: 600;
    letter-spacing: 0.24em;
    text-transform: uppercase;
    color: var(--periwinkle);
  }
</style>
</head>
